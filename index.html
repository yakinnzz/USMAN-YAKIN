<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Dart - Cyber Virus</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* BODY */

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:#00ff9f;
background-image:
linear-gradient(rgba(0,255,150,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,150,0.08) 1px, transparent 1px);
background-size:40px 40px;
}

/* HEADER */

header{
text-align:center;
padding:40px;
background:#010a05;
border-bottom:3px solid #00ff9f;
box-shadow:0 0 20px #00ff9f;
}

header h1{
font-size:26px;
color:#00ff9f;
text-shadow:0 0 10px #00ff9f,0 0 25px #00ff9f;
}

header p{
color:#7affc7;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* CARD */

.card{
background:rgba(0,20,10,0.85);
padding:30px;
margin-bottom:40px;
border:1px solid #00ff9f;
border-radius:10px;
box-shadow:0 0 15px #00ff9f inset,0 0 15px #00ff9f;
transition:0.3s;
}

.card:hover{
box-shadow:0 0 25px #00ff9f,0 0 60px #00ff9f;
transform:translateY(-6px);
}

/* TEXT */

h2{
color:#00ff9f;
margin-bottom:20px;
text-shadow:0 0 10px #00ff9f;
}

p,li{
line-height:1.7;
color:#a8ffe2;
}

/* CODE TERMINAL STYLE */

pre{
background:#000;
color:#00ff9f;
padding:20px;
border-radius:10px;
border:1px solid #00ff9f;
box-shadow:0 0 10px #00ff9f inset;
overflow-x:auto;
font-family:monospace;
}

/* IFRAME */

iframe{
width:100%;
height:500px;
margin-top:20px;
border:1px solid #00ff9f;
border-radius:10px;
box-shadow:0 0 20px #00ff9f;
}

/* COMMENT BOX */

.comment-box{
background:#000;
padding:20px;
border-radius:10px;
border:1px solid #00ff9f;
box-shadow:0 0 15px #00ff9f;
margin-bottom:40px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
background:#000;
border:1px solid #00ff9f;
color:#00ff9f;
font-family:'Orbitron';
}

/* BUTTON */

button{
background:#00ff9f;
color:black;
border:none;
padding:10px 20px;
cursor:pointer;
box-shadow:0 0 10px #00ff9f;
}

button:hover{
box-shadow:0 0 20px #00ff9f,0 0 40px #00ff9f;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#010a05;
border-top:3px solid #00ff9f;
box-shadow:0 0 20px #00ff9f;
color:#7affc7;
}

</style>
</head>

<body>
